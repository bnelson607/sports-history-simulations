<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sports History Simulations</title>
  <base href="/sports-history-simulations/">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div id="header-placeholder"></div>

  <div class="featured-article-box">
    <h2 style="margin-top: 0; font-size: 1.75em; color: #004080;">Featured Article</h2>
    <h3 style="font-size: 1.4em; margin: 0.25em 0;">
      <a href="articles/NHL/canada_stanley_cup_drought/canada_stanley_cup_drought.html" style="text-decoration: none; color: #003366;">
        Canada's Stanley Cup Drought
      </a>
    </h3>
    <div class="meta" style="font-size: 0.95em; color: #666; margin-bottom: 0.75em;">
      Published: July 10, 2025
    </div>
    <div class="preview" style="font-size: 1.05em; color: #222; line-height: 1.6;">
      How likely is it that no Canadian team has won a Stanley Cup since 1993?
    </div>
  </div>

  <div class="power-rankings">
    <h2 class="centered">Current Elo Ratings</h2>
    <div class="tab-buttons">
      <button class="tab-btn active" data-sport="mlb">MLB</button>
      <button class="tab-btn" data-sport="wnba">WNBA</button>
      <button class="tab-btn" data-sport="mls">MLS</button>
      <button class="tab-btn" data-sport="usl">USL</button>
    </div>

    <div id="mlb" class="tab-content active"></div>
    <div id="wnba" class="tab-content"></div>
    <div id="mls" class="tab-content"></div>
    <div id="usl" class="tab-content"></div>
  </div>

  <script>
    // Load header
    fetch('header.html')
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);

    // Load power ranking tables
    const tables = {
      mlb: 'power_rankings/mlb_table.html',
      wnba: 'power_rankings/wnba_table.html',
      mls: 'power_rankings/mls_table.html',
      usl: 'power_rankings/usl_table.html'
    };

    for (const [sport, file] of Object.entries(tables)) {
      fetch(file)
        .then(response => response.text())
        .then(data => document.getElementById(sport).innerHTML = data);
    }

    // Tab switching logic
    const tabButtons = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');

    tabButtons.forEach(button => {
      button.addEventListener('click', () => {
        tabButtons.forEach(btn => btn.classList.remove('active'));
        tabContents.forEach(tc => tc.classList.remove('active'));
        button.classList.add('active');
        document.getElementById(button.getAttribute('data-sport')).classList.add('active');
      });
    });
  </script>

</body>
</html>
