<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <meta name="description" content="Explore the archive of sports simulation articles with analyses of simulated seasons and playoff brackets in the National Football League (NFL).">

  <!-- Link to external styles -->
  <link rel="stylesheet" href="/sports-history-simulations/styles.css" />
  
  <!-- Add any simulation-specific styles here if needed -->
  <style>
    /* Minimal or unique styles can go here */
  </style>
</head>
<body>

  <!-- Header container -->
  <div id="header"></div>

  <div class="article-list">
  
    <h1 class="article-header">All NFL Simulation Articles</h1>
    <ul class="article-list">
      <li>
        <h2 class="article-title-link"><a href="/sports-history-simulations/articles/NFL/most_difficult_super_bowl_paths_part_2/">Ranking the Most Difficult Super Bowl Paths: Part 2</a></h2>
        <div class="meta">Published: July 11, 2025</div>   
      </li>

      <li>
        <h2 class="article-title-link"><a href="/sports-history-simulations/articles/NFL/most_difficult_super_bowl_paths_part_1/">Ranking the Most Difficult Super Bowl Paths: Part 1</a></h2>
        <div class="meta">Published: July 10, 2025</div>
      </li>

      <!-- More articles here -->
    </ul>
    <p><a href="/sports-history-simulations/articles/">← Back to All Articles</a></p>

  </div>

  <div id="site-footer"></div>

  <!-- Load header HTML dynamically -->
  <script>
    fetch('/sports-history-simulations/header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header').innerHTML = data;
      });

    // Load footer
    fetch('/sports-history-simulations/footer.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('site-footer').innerHTML = data;
    });
  </script>

  <script>
    let isReloadingIframe = false;

    function showTab(group, id) {
      if (isReloadingIframe) {
        setTimeout(() => showTab(group, id), 100);
        return;
      }

      document.querySelectorAll('.tab-content.' + group).forEach(el => el.style.display = 'none');

      const tab = document.getElementById(id);
      tab.style.display = 'block';

      const container = event.target.closest('.tab-buttons');
      if (container) {
        container.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
      }

      const iframe = tab.querySelector('iframe');
      if (iframe && !iframe.dataset.reloaded) {
        isReloadingIframe = true;

        const originalSrc = iframe.src;
        iframe.src = '';

        setTimeout(() => {
          iframe.src = originalSrc + (originalSrc.includes('?') ? '&' : '?') + 'reload';
          iframe.dataset.reloaded = "true";
          iframe.onload = () => {
            isReloadingIframe = false;
          };
        }, 10);
      }
    }
  </script>
</body>
</html>
